<!DOCTYPE html><html lang="id"><head>
    
    <link rel="icon" href="icon.png" type="image/png">
<meta name="theme-color" content="#ffc107">
    
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EMU JOKI - Kotak Saran</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
body{
    font-family:Inter; 
    padding:20px; 
    margin:0;
    min-height:100vh;
    color:white;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images3.alphacoders.com/131/thumb-1920-1311019.jpg') no-repeat center fixed;
    background-size: cover;
    display:flex;
    align-items:center;
    justify-content:center;
}
.box{background: rgba(17, 17, 17, 0.4); padding:25px; border-radius:16px; backdrop-filter: blur(10px); width:100%; max-width:550px; box-shadow:0 8px 30px rgba(0,0,0,0.5);}
h2{text-align:center; margin-bottom:10px;}
.sub{text-align:center; font-size:13px; color:#aaa; margin-bottom:20px;}
label{font-size:14px; font-weight:600; margin-top:10px; display:block;}
input,textarea{width:100%; padding:12px; margin:6px 0 12px 0; border-radius:8px; border:1px solid #444; background:#1a1a1a; color:white; box-sizing:border-box; font-size:15px;} 
button{background:#2ecc71; color:white; border:none; padding:14px; border-radius:8px; font-weight:700; width:100%; cursor:pointer; font-size:16px; margin-top:10px;}
button:hover{opacity:0.9;}
#status{text-align:center; margin-top:10px;}
.catatan{background: rgba(46, 204, 113, 0.15); border-left:3px solid #2ecc71; padding:12px; border-radius:8px; font-size:13px; margin:15px 0; line-height:1.6;}
</style>
</head><body>
<div class="box">
<h2>🦊 Kotak Saran EMU JOKI</h2>
<p class="sub">Punya saran produk joki baru? Tulis di bawah ya</p>

<label>1. Game</label>
<input id="game" placeholder="Contoh: Genshin Impact, HSR, ZZZ">

<label>2. Jenis Produk</label>
<input id="kategori" placeholder="Contoh: Eksplorasi, Quest, Level Up, Farm">

<label>3. Nama Produk</label>
<input id="nama" placeholder="Contoh: Jasa 100% Eksplorasi Fontaine">

<label>4. Deskripsi Detail</label>
<textarea id="deskripsi" placeholder="Jelaskan sedetail mungkin saran kamu..." rows="4"></textarea>

<label>5. Perkiraan Harga</label>
<input id="harga" placeholder="Contoh: Rp 50.000 - Rp 100.000">

<label>6. Link Gambar Referensi</label>
<input id="gambar" placeholder="Opsional: link gambar">



<button onclick="kirim()">Kirim Saran via WhatsApp</button>
<p id="status"></p>
</div>

<script>
const WA = "https://wa.me/6285150886538";

function kirim(){
    if(game.value === "" || nama.value === "" || deskripsi.value === ""){ 
        alert("Harap isi Game, Nama Produk, dan Deskripsi dulu ya!");
        return; 
    }
    const pesan = `Saran Produk 🦊%0A%0A
*KOTAK SARAN BARU*%0A%0A
Game: ${game.value}%0A
Jenis: ${kategori.value}%0A
Nama Produk: ${nama.value}%0A
Perkiraan Harga: ${harga.value}%0A
Deskripsi: ${deskripsi.value}%0A
Link Gambar: ${gambar.value}%0A%0A
Terima kasih atas sarannya!`;
    
    window.open(WA + "?text=" + encodeURIComponent(pesan), '_blank');
    document.getElementById('status').innerText = "✅ Mengalihkan ke WhatsApp...";
    document.getElementById('status').style.color = "#2ecc71";
}
</script></body></html>
