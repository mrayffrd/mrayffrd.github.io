<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Blast Master - Hard Edition</title>

    <!-- FAVICON FIX: Harus image/png dan file lokal. Link imgur gak bisa -->
    <link rel="icon" href="logo.png" type="image/png">
    <meta name="theme-color" content="#ffc107">

    <style>
        :root {
            --bg-color: #0f0f12;
            --container-bg: #16161e;
            --grid-bg: #1f1f2a;
            --cell-empty: #2a2a38;
            --accent-color: #ffc107;
            --game-width: min(100vw - 20px, 420px);
            --cell-size: calc((var(--game-width) - 40px) / 7);
        }
        * { box-sizing: border-box; touch-action: none; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color); color: #fff; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 10px; overflow: hidden; user-select: none;
        }
       .game-container {
            background: var(--container-bg); width: var(--game-width); padding: 15px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); display: flex; flex-direction: column; align-items: center; position: relative;
        }
        header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h1 { margin: 0; color: var(--accent-color); font-size: 20px; letter-spacing: 1px; }
        #score-board { font-size: 18px; font-weight: bold; background: rgba(255,255,255,0.08); padding: 6px 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        #grid {
            display: grid; grid-template-columns: repeat(7, var(--cell-size)); grid-template-rows: repeat(7, var(--cell-size));
            gap: 4px; background-color: var(--grid-bg); padding: 6px; border-radius: 12px; width: fit-content;
        }
       .cell {
            width: var(--cell-size); height: var(--cell-size); background-color: var(--cell-empty);
            border-radius: 6px; transition: background-color 0.15s ease;
        }
       .cell.filled { background-color: #0288d1; box-shadow: inset 0 0 0px rgba(255,255,255,0.4); }
       .cell.hover-valid { background-color: rgba(76, 175, 80, 0.4)!important; border: 2px dashed #4CAF50!important; }
       .cell.hover-invalid { background-color: rgba(244, 67, 54, 0.4)!important; border: 2px dashed #F44336!important; }
       .cell.blast { animation: blastAnim 0.35s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; }
        @keyframes blastAnim {
            0% { transform: scale(1); background-color: #ff5722; }
            50% { transform: scale(1.1); background-color: #ffeb3b; }
            100% { transform: scale(0); background-color: var(--cell-empty); }
        }
        #dock {
            display: flex; justify-content: space-around; align-items: center; width: 100%; height: 110px;
            margin-top: 15px; background: rgba(0,0,0,0.3); border-radius: 15px; padding: 5px;
        }
       .dock-slot { width: 30%; height: 100%; display: flex; justify-content: center; align-items: center; position: relative; }
       .piece {
            display: grid; gap: 2px; position: absolute; cursor: grab;
            transform: scale(0.55); transform-origin: center; transition: transform 0.2s ease;
        }
       .piece.dragging {
            cursor: grabbing;
            transform: scale(1.05) translateY(-40px); z-index: 100; pointer-events: none;
            filter: drop-shadow(0 8px 12px rgba(233, 30, 99, 0.6)); /* TAMBAH BAYANGAN DI BLOK */
        }
       .piece-cell { width: var(--cell-size); height: var(--cell-size); }
       .piece-cell.filled { background-color: #e91e63; border-radius: 6px; box-shadow: inset 0 0 4px rgba(255,255,255,0.4); }
        #game-over-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 15, 18, 0.95); border-radius: 20px; display: none;
            flex-direction: column; justify-content: center; align-items: center; z-index: 1000;
        }
        #game-over-screen h2 { color: #f44336; font-size: 32px; margin-bottom: 10px; }
        #game-over-screen button {
            background: var(--accent-color); color: #000; border: none; padding: 10px 25px;
            font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <header>
            <h1>BLOCK MASTER</h1>
            <div id="score-board">SKOR: <span id="score">0</span></div>
        </header>
        <div id="grid"></div>
        <div id="dock">
            <div class="dock-slot" data-slot="0"></div>
            <div class="dock-slot" data-slot="1"></div>
            <div class="dock-slot" data-slot="2"></div>
        </div>
        <div id="game-over-screen">
            <h2>GAME OVER</h2>
            <p>Skor Akhir Anda: <span id="final-score">0</span></p>
            <button onclick="resetGame()">Main Lagi</button>
        </div>
    </div>

    <script>
        const GRID_SIZE = 7;
        const gridElement = document.getElementById('grid');
        const scoreElement = document.getElementById('score');
        const dockSlots = document.querySelectorAll('.dock-slot');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreElement = document.getElementById('final-score');

        let score = 0;
        let grid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));

        const HARD_PIECES = [
            { shape: [[1,1,1,1]], cols: 4, rows: 1 }, { shape: [[1],[1],[1],[1]], cols: 1, rows: 4 },
            { shape: [[1,1,1],[0,1,0],[0,1,0]], cols: 3, rows: 3 }, { shape: [[1,1],[1,1]], cols: 2, rows: 2 },
            { shape: [[1,1,1],[1,0,0],[1,0,0]], cols: 3, rows: 3 }, { shape: [[1,1,0],[0,1,1]], cols: 3, rows: 2 },
            { shape: [[0,1,1],[1,1,0]], cols: 3, rows: 2 }, { shape: [[1,0],[1,1]], cols: 2, rows: 2 },
            { shape: [[1,1,1]], cols: 3, rows: 1 }
        ];

        let activeDrag = null;

        function initGrid() {
            gridElement.innerHTML = '';
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    gridElement.appendChild(cell);
                }
            }
        }

        function drawGridDOM() {
            document.querySelectorAll('.cell').forEach(cell => {
                const r = parseInt(cell.dataset.row);
                const c = parseInt(cell.dataset.col);
                cell.className = 'cell';
                if (grid[r][c] === 1) cell.classList.add('filled');
            });
        }

        function spawnPieces() {
            dockSlots.forEach(slot => {
                if (slot.children.length === 0) {
                    const pieceData = HARD_PIECES[Math.floor(Math.random() * HARD_PIECES.length)];
                    createPieceElement(slot, pieceData);
                }
            });
            checkGameOverCondition();
        }

        function createPieceElement(parent, data) {
            const pieceDiv = document.createElement('div');
            pieceDiv.classList.add('piece');
            pieceDiv.dataset.pieceId = HARD_PIECES.indexOf(data); // PENTING BUAT GAME OVER
            pieceDiv.style.gridTemplateColumns = `repeat(${data.cols}, var(--cell-size))`;

            data.shape.forEach(row => {
                row.forEach(val => {
                    const cell = document.createElement('div');
                    cell.classList.add('piece-cell');
                    if (val === 1) cell.classList.add('filled');
                    pieceDiv.appendChild(cell);
                });
            });
            pieceDiv.addEventListener('pointerdown', (e) => startDrag(e, pieceDiv, data));
            parent.appendChild(pieceDiv);
        }

        function startDrag(e, element, data) {
            e.preventDefault();
            element.setPointerCapture(e.pointerId);
            element.classList.add('dragging');

            activeDrag = {
                element: element, data: data, startX: e.clientX, startY: e.clientY,
                parentSlot: element.parentElement, pointerId: e.pointerId
            };
            updateDragPosition(e.clientX, e.clientY);
            element.addEventListener('pointermove', onDragMove);
            element.addEventListener('pointerup', onDragEnd);
        }

        function onDragMove(e) {
            if (!activeDrag) return;
            updateDragPosition(e.clientX, e.clientY);
            highlightGridIntersect(e.clientX, e.clientY);
        }

        function updateDragPosition(clientX, clientY) {
            const dx = clientX - activeDrag.startX;
            const dy = clientY - activeDrag.startY;
            activeDrag.element.style.transform = `translate(${dx}px, ${dy}px) scale(1.05) translateY(-40px)`;
        }

        // INI KUNCINYA: CEK TITIK TENGAH BAWAH BLOK
        function getIntersectingGridCell(clientX, clientY) {
    const rect = activeDrag.element.getBoundingClientRect(); // ambil ukuran blok
    const targetX = clientX - 25 + (rect.height / 3); // tengah horizontal
    const targetY = clientY - 75 + (rect.height / 4); // jari -40px + setengah tinggi blok

    activeDrag.element.style.display = 'none';
    const hitElement = document.elementFromPoint(targetX, targetY); // <-- CEK DI TENGAH BAWAH
    activeDrag.element.style.display = 'grid';

    if (hitElement && hitElement.classList.contains('cell')) {
        const { rows, cols } = activeDrag.data;
        let row = parseInt(hitElement.dataset.row) - Math.floor(rows / 2); // CENTER
        let col = parseInt(hitElement.dataset.col) - Math.floor(cols / 2);
        return { row, col };
    }
    return null;
}

        function highlightGridIntersect(clientX, clientY) {
            clearHoverEffects();
            const cellPos = getIntersectingGridCell(clientX, clientY);
            if (!cellPos) return;

            const { row, col } = cellPos;
            const { shape, rows, cols } = activeDrag.data;
            let isValid = canPlacePiece(row, col, shape, rows, cols);

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (shape[r][c] === 1) {
                        const cell = document.querySelector(`.cell[data-row='${row + r}'][data-col='${col + c}']`);
                        if (cell) cell.classList.add(isValid? 'hover-valid' : 'hover-invalid');
                    }
                }
            }
        }

        function clearHoverEffects() {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('hover-valid', 'hover-invalid'));
        }

        function onDragEnd(e) {
            if (!activeDrag) return;
            const element = activeDrag.element;
            element.removeEventListener('pointermove', onDragMove);
            element.removeEventListener('pointerup', onDragEnd);
            element.releasePointerCapture(e.pointerId);

            const cellPos = getIntersectingGridCell(e.clientX, e.clientY);
            let placed = false;

            if (cellPos) {
                const { row, col } = cellPos;
                const { shape, rows, cols } = activeDrag.data;
                if (canPlacePiece(row, col, shape, rows, cols)) {
                    for (let r = 0; r < rows; r++) {
                        for (let c = 0; c < cols; c++) {
                            if (shape[r][c] === 1) grid[row + r][col + c] = 1;
                        }
                    }
                    score += 15;
                    element.remove();
                    placed = true;
                    drawGridDOM();
                    checkLinesAndBlast();
                    const remainingPieces = Array.from(dockSlots).some(slot => slot.children.length > 0);
                    if (!remainingPieces) spawnPieces();
                    else checkGameOverCondition();
                }
            }

            if (!placed) {
                element.classList.remove('dragging');
                element.style.transform = 'scale(0.55)'; // BALIKIN KE 0.55
                activeDrag.parentSlot.appendChild(element);
            }
            clearHoverEffects();
            activeDrag = null;
        }

        function canPlacePiece(startRow, startCol, shape, rows, cols) {
            if (startRow < 0 || startCol < 0 || startRow + rows > GRID_SIZE || startCol + cols > GRID_SIZE) return false;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (shape[r][c] === 1 && grid[startRow + r][startCol + c] === 1) return false;
                }
            }
            return true;
        }

        function checkLinesAndBlast() {
            let rowsToBlast = []; let colsToBlast = [];
            for (let r = 0; r < GRID_SIZE; r++) if (grid[r].every(val => val === 1)) rowsToBlast.push(r);
            for (let c = 0; c < GRID_SIZE; c++) {
                let colFull = true; for (let r = 0; r < GRID_SIZE; r++) if (grid[r][c] === 0) colFull = false;
                if (colFull) colsToBlast.push(c);
            }
            if (rowsToBlast.length > 0 || colsToBlast.length > 0) {
                rowsToBlast.forEach(r => {
                    for (let c = 0; c < GRID_SIZE; c++) document.querySelector(`.cell[data-row='${r}'][data-col='${c}']`).classList.add('blast');
                    grid[r] = Array(GRID_SIZE).fill(0); score += 150;
                });
                colsToBlast.forEach(c => {
                    for (let r = 0; r < GRID_SIZE; r++) {
                        document.querySelector(`.cell[data-row='${r}'][data-col='${c}']`).classList.add('blast');
                        grid[r][c] = 0;
                    }
                    score += 150;
                });
                scoreElement.textContent = score;
                setTimeout(drawGridDOM, 350);
            }
        }

        function checkGameOverCondition() {
            let currentPiecesInDock = [];
            dockSlots.forEach(slot => {
                if (slot.children.length > 0) {
                    const id = parseInt(slot.firstChild.dataset.pieceId);
                    currentPiecesInDock.push(HARD_PIECES[id]);
                }
            });
            if (currentPiecesInDock.length === 0) return;
            let anyMovePossible = false;
            for (let pData of currentPiecesInDock) {
                for (let r = 0; r < GRID_SIZE; r++) {
                    for (let c = 0; c < GRID_SIZE; c++) {
                        if (canPlacePiece(r, c, pData.shape, pData.rows, pData.cols)) { anyMovePossible = true; break; }
                    }
                    if (anyMovePossible) break;
                }
                if (anyMovePossible) break;
            }
            if (!anyMovePossible) {
                setTimeout(() => {
                    finalScoreElement.textContent = score;
                    gameOverScreen.style.display = 'flex';
                }, 300);
            }
        }

        function resetGame() {
            score = 0; scoreElement.textContent = '0';
            grid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
            gameOverScreen.style.display = 'none';
            dockSlots.forEach(slot => slot.innerHTML = '');
            initGrid(); drawGridDOM(); spawnPieces();
        }

        initGrid(); spawnPieces();
    </script>
</body>
</html>
