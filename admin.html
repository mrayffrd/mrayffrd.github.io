<!DOCTYPE html><html lang="id"><head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin EMU</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
body{
    font-family:Inter; 
    padding:20px; 
    margin:0;
    min-height:100vh;
    color:white;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images3.alphacoders.com/131/thumb-1920-1311019.jpg') no-repeat center center fixed;
    background-size: cover;
    display:flex;
    align-items:center;
    justify-content:center;
}
.box{background: rgba(17, 17, 17, 0.243); padding:25px; border-radius:16px; backdrop-filter: blur(10px); width:100%; max-width:500px; box-shadow:0 8px 30px rgba(0,0,0,0.5);}
h2{text-align:center; margin-bottom:20px;}
input,select,textarea{width:100%; padding:12px; margin:8px 0; border-radius:8px; border:1px solid #444; background:#1a1a1a; color:white; box-sizing:border-box; font-size:15px;} 
button{background:#2ecc71; color:white; border:none; padding:14px; border-radius:8px; font-weight:700; width:100%; cursor:pointer; font-size:16px;}
button:hover{opacity:0.9;}
#status{text-align:center; margin-top:10px;}

/* Tombol Harga */
.harga-wrap{display:flex; gap:8px; align-items:center; margin:8px 0;}
.harga-wrap button{width:50px; padding:12px; background:#3498db; flex-shrink:0;}
.harga-wrap input{text-align:center; font-weight:700;}
</style>
</head><body>
<div class="box">
<h2>Kotak Saran</h2>
<input id="password" type="password" placeholder="Kode (Opsional)">
<select id="game"><option value="genshin">Genshin</option><option value="hsr">HSR</option></select>
<select id="kategori"><option value="eksplorasi">Eksplorasi</option><option value="quest">Quest</option><option value="level">Level</option></select>
<input id="nama" placeholder="Nama Produk">
<textarea id="deskripsi" placeholder="Deskripsi"></textarea>

<div class="harga-wrap">
    <button type="button" onclick="ubahHarga(-1000)">-</button>
    <input id="harga" type="text" placeholder="Rp 0" value="Rp 0">
    <button type="button" onclick="ubahHarga(1000)">+</button>
</div>

<input id="gambar" placeholder="Link Gambar Img (Opsional)">
<button onclick="kirim()">+ Kirim</button>
<p id="status"></p>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxL3kVn_10-yypGSc8wnH9QzRxOZ2c_gXEmf2HzOV6-hOgcTaLzD-PSlVTFn3EHzYc3/exec";
const KODE_ADMIN = "emu118201";
const WA = "https://wa.me/6285150886538";
let harga = 0;
function formatRupiah(angka){ return "Rp " + angka.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
function ubahHarga(jumlah){ harga += jumlah; if(harga < 1000) harga = 1000; document.getElementById('harga').value = formatRupiah(harga); }
document.getElementById('harga').addEventListener('input', e => { harga = Math.round((parseInt(e.target.value.replace(/[^0-9]/g, '')) || 0) / 1000) * 1000; e.target.value = formatRupiah(harga); });
document.getElementById('password').addEventListener('input', () => { document.getElementById('status').innerText = ""; });

async function kirim(){
    const formData = new FormData();
    formData.append('password', password.value);
    formData.append('game', game.value);
    formData.append('kategori', kategori.value);
    formData.append('nama', nama.value);
    formData.append('harga', harga);
    formData.append('gambar', gambar.value);
    formData.append('deskripsi', deskripsi.value);

    if(password.value === ""){
        if(confirm("Mau kirim saran jokian WhatsApp?")) window.open(WA + "?text=" + encodeURIComponent(`Halo Admin EMU...`), '_blank');
        return;
    }
    if(password.value!== KODE_ADMIN){ alert("❌ Kode salah!"); document.getElementById('status').innerText = "Kode salah"; document.getElementById('status').style.color = "#e74c3c"; return; }
    if(!confirm("Kode benar! Yakin mau tambah produk ini?")) return;

    document.getElementById('status').innerText = "Mengirim...";
    try{
        await fetch(API, {method: 'POST', mode: 'no-cors', body: formData});
        document.getElementById('status').innerText = "✅ Berhasil ditambah!"; document.getElementById('status').style.color = "#2ecc71";
        password.value=nama.value=deskripsi.value=gambar.value=""; harga=0; document.getElementById('harga').value="Rp 0";
        setTimeout(() => { document.getElementById('status').innerText = ""; }, 3000);
    } catch(e){ document.getElementById('status').innerText = "❌ Gagal konek"; document.getElementById('status').style.color = "#e74c3c"; }
}
</script></body></html>
